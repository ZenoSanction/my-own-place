<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Own Place</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Custom title bar ─────────────────────────────────────────────────────── -->
<header id="titlebar">
  <div class="tb-drag">
    <span class="tb-logo">⬡</span>
    <span class="tb-title">My Own Place</span>
  </div>
  <div class="tb-controls">
    <button id="btn-minimize" title="Minimise">&#8212;</button>
    <button id="btn-maximize" title="Maximise">&#9633;</button>
    <button id="btn-close"    title="Close">&#10005;</button>
  </div>
</header>

<!-- ── App shell ─────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="server-indicator" class="indicator stopped" title="Server stopped">
      <span class="dot"></span>
    </div>

    <ul class="nav-list">
      <li data-page="dashboard" class="active" title="Dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Dashboard</span>
      </li>
      <li data-page="files" title="File Manager">
        <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        <span>Files</span>
      </li>
      <li data-page="photos" title="Photos">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        <span>Photos</span>
      </li>
      <li data-page="editor" title="Site Editor">
        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
        <span>Editor</span>
      </li>
      <li data-page="templates" title="Templates">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        <span>Templates</span>
      </li>
      <li data-page="log" title="Activity Log">
        <svg viewBox="0 0 24 24"><path d="M19 3H4.99c-1.11 0-1.98.89-1.98 2L3 19c0 1.1.88 2 1.99 2H19c1.1 0 2-.9 2-2V5c0-1.11-.9-2-2-2zm-7 3c1.38 0 2.5 1.12 2.5 2.5S13.38 11 12 11s-2.5-1.12-2.5-2.5S10.62 6 12 6zM6 17v-.83c0-1.22.68-2.29 1.73-2.82C8.94 12.77 10.42 12.5 12 12.5s3.06.27 4.27.85c1.05.53 1.73 1.6 1.73 2.82V17H6z"/></svg>
        <span>Activity</span>
      </li>
      <li data-page="guestbook" title="Guestbook">
        <svg viewBox="0 0 24 24"><path d="M21 6.5C21 5.1 19.9 4 18.5 4h-13C4.1 4 3 5.1 3 6.5v11C3 18.9 4.1 20 5.5 20H6v2l4-2h8.5c1.4 0 2.5-1.1 2.5-2.5V6.5zM13 14H7v-2h6v2zm4-4H7V8h10v2z"/></svg>
        <span>Guestbook</span>
      </li>
      <li data-page="settings" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        <span>Settings</span>
      </li>
    </ul>

    <div class="sidebar-footer">
      <button id="theme-toggle" title="Toggle light / dark theme"
              onclick="toggleTheme()">🌙</button>
      <span id="version-label">v1.1.0</span>
    </div>
  </nav>

  <!-- Main content area — populated entirely by renderer.js -->
  <main id="content">
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:1rem;color:#8b949e">
      <div class="spinner"></div>
      <span style="font-size:.9rem">Starting up…</span>
    </div>
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Modal backdrop -->
<div id="modal-backdrop" class="hidden">
  <div id="modal-box">
    <button id="modal-close">&#10005;</button>
    <div id="modal-content"></div>
  </div>
</div>

<!--
  Error safety net — runs BEFORE renderer.js.
  If renderer.js fails to parse (syntax error) or throws during setup,
  this handler catches it and displays the error on screen so the user
  knows what went wrong without needing to open DevTools.
-->
<script>
// ── Pre-renderer error safety net ─────────────────────────────────────────────
// This script runs BEFORE renderer.js.  If renderer.js has a syntax error or
// throws during initialisation, this handler catches it and shows the full
// error text in a copyable textarea so it can be pasted directly into the chat.

function _showBootError (title, detail) {
  var el = document.getElementById('content');
  if (!el) return;
  var id = 'boot-err-' + Date.now();
  el.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:100%;padding:1rem">' +
      '<div style="background:#161b22;border:1px solid #f85149;border-radius:12px;' +
                  'padding:2rem;max-width:580px;width:100%;text-align:center;font-family:sans-serif">' +
        '<div style="font-size:2.5rem;margin-bottom:.6rem">⚠️</div>' +
        '<h2 style="color:#f85149;margin-bottom:.5rem;font-size:1.1rem">' + title + '</h2>' +
        '<textarea id="' + id + '" readonly ' +
                  'style="width:100%;height:110px;background:#0d1117;border:1px solid #30363d;' +
                         'border-radius:8px;color:#c9d1d9;font-family:monospace;font-size:.78rem;' +
                         'padding:.75rem;resize:vertical;line-height:1.5;text-align:left">' +
          detail +
        '</textarea>' +
        '<div style="display:flex;gap:.5rem;justify-content:center;margin-top:.75rem;flex-wrap:wrap">' +
          '<button onclick="location.reload()" ' +
                  'style="padding:.45rem 1.2rem;background:#58a6ff;color:#0d1117;border:none;' +
                         'border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600">' +
            '↺ Reload' +
          '</button>' +
          '<button id="' + id + '-btn" ' +
                  'onclick="navigator.clipboard.writeText(document.getElementById(\'' + id + '\').value)' +
                         '.then(function(){document.getElementById(\'' + id + '-btn\').textContent=\'✓ Copied!\'})" ' +
                  'style="padding:.45rem 1.2rem;background:#21262d;color:#c9d1d9;border:1px solid #30363d;' +
                         'border-radius:6px;cursor:pointer;font-size:.85rem">' +
            '📋 Copy Error' +
          '</button>' +
        '</div>' +
        '<p style="color:#6e7681;font-size:.72rem;margin-top:.75rem">' +
          'Copy the error above and paste it into the chat, or press ' +
          '<kbd style="background:#21262d;padding:.1rem .4rem;border-radius:4px">F12</kbd> for DevTools.' +
        '</p>' +
      '</div>' +
    '</div>';
}

window.onerror = function (msg, src, line, col, err) {
  var detail = String(err && err.stack ? err.stack : msg) +
               '\n\nFile: ' + String(src) +
               '\nLine: ' + line + ', Col: ' + col;
  _showBootError('Script Error', detail);
  return true; // prevent default browser error handling
};

window.addEventListener('unhandledrejection', function (e) {
  var el = document.getElementById('content');
  if (!el || !el.querySelector('.spinner')) return; // only intercept during loading
  var reason = e.reason;
  var detail  = reason && reason.stack ? reason.stack : String(reason);
  _showBootError('Unhandled Promise Rejection', detail);
});
</script>

<script src="js/renderer.js"></script>
</body>
</html>
